name: Deploy to Tencent Cloud Lighthouse

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "./*"
          target: "/home/deployer/sygn"
          overwrite: true

      - name: Rebuild and restart Docker containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/deployer/sygn
            # 使用 docker compose V2 命令（若你的服务器是 V1 请改回 docker-compose）
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            # 等待数据库启动（如果需要）
            sleep 5
            # 执行 Django 迁移和静态文件收集（请将 web 替换为你的服务名）
            docker compose exec web python manage.py migrate --noinput
            docker compose exec web python manage.py collectstatic --noinput
            # 只清理悬空镜像，避免误删
            docker image prune -f
