# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name sangyugongnuan.site;   # 改为你的实际域名
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务器
server {
    listen 443 ssl;
    http2 on;
    server_name sangyugongnuan.site;   # 改为你的实际域名

    ssl_certificate     /etc/nginx/ssl/sangyugongnuan.site_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/sangyugongnuan.site.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

# OCSP Stapling 配置
    ssl_stapling on;
    ssl_stapling_verify on;
    # ⚠️ 重要：请将下行的证书路径替换为您的完整证书链文件（包含中间证书和根证书）
    # 如果您的 _bundle.crt 已包含中间证书，可以先尝试直接使用它，否则需单独下载链文件
    ssl_trusted_certificate /etc/nginx/ssl/trustchain.pem;  # 🔔 需要您准备正确的链文件

    # 公共 DNS 解析器（用于 OCSP 查询）
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # === SSL 配置结束 ===

    location /static/ {
        alias /app/static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        access_log off;
    }

    location / {
        include uwsgi_params;
        uwsgi_pass django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
