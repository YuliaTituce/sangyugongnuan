{% extends 'volunteers/admin/admin_base.html' %}
{% load static %}

{% block title %}手动调整积分 · 桑榆共暖{% endblock %}

{% block content %}
<div class="section-title">
    <i class="fas fa-edit"></i> 手动调整积分
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">积分变动数量</label>
                <input type="number" name="amount" class="form-control" required>
                <div class="form-text">正数为奖励，负数为惩罚扣除</div>
            </div>
            <div class="mb-3">
                <label class="form-label">备注</label>
                <textarea name="remark" class="form-control" rows="2"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">提交调整</button>
            <a href="{% url 'points_management' %}" class="btn btn-secondary">返回</a>
        </form>
    </div>
</div>
{% endblock %}
