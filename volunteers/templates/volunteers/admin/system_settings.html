{% extends "volunteers/admin/admin_base.html" %}
{% load static %}

{% block title %}系统设置 · 桑榆共暖{% endblock %}

{% block content %}
<div class="section-title">
    <i class="fas fa-cog"></i> 系统设置
</div>

<form method="post" class="needs-validation" novalidate>
    {% csrf_token %}
    
    <div class="row">
        <!-- 基础设置 -->
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">网站信息</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="siteName" class="form-label">网站名称</label>
                        <input type="text" class="form-control" id="siteName" name="site_name" value="{{ settings.site_name|default:'桑榆共暖' }}">
                    </div>
                    <div class="mb-3">
                        <label for="siteDescription" class="form-label">网站描述</label>
                        <textarea class="form-control" id="siteDescription" name="site_description" rows="3">{{ settings.site_description|default:'' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="contactEmail" class="form-label">联系邮箱</label>
                        <input type="email" class="form-control" id="contactEmail" name="contact_email" value="{{ settings.contact_email|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label for="contactPhone" class="form-label">联系电话</label>
                        <input type="text" class="form-control" id="contactPhone" name="contact_phone" value="{{ settings.contact_phone|default:'' }}">
                    </div>
                </div>
            </div>
        </div>

        <!-- 功能开关 -->
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">功能开关</h5>
                </div>
                <div class="card-body">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="enableRegistration" name="enable_registration" {% if settings.enable_registration|default:True %}checked{% endif %}>
                        <label class="form-check-label" for="enableRegistration">允许新用户注册</label>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="requireEmailVerification" name="require_email_verification" {% if settings.require_email_verification|default:True %}checked{% endif %}>
                        <label class="form-check-label" for="requireEmailVerification">注册需邮箱验证</label>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="enableFeedback" name="enable_feedback" {% if settings.enable_feedback|default:True %}checked{% endif %}>
                        <label class="form-check-label" for="enableFeedback">启用反馈功能</label>
                    </div>
                    <hr>
                    <h6 class="mt-3">自动审核设置</h6>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="autoApproveVolunteers" name="auto_approve_volunteers" {% if settings.auto_approve_volunteers|default:False %}checked{% endif %}>
                        <label class="form-check-label" for="autoApproveVolunteers">自动通过志愿者认证</label>
                    </div>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="autoApproveOrganizers" name="auto_approve_organizers" {% if settings.auto_approve_organizers|default:False %}checked{% endif %}>
                        <label class="form-check-label" for="autoApproveOrganizers">自动通过组织者认证</label>
                    </div>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="autoApproveActivities" name="auto_approve_activities" {% if settings.auto_approve_activities|default:False %}checked{% endif %}>
                        <label class="form-check-label" for="autoApproveActivities">自动通过活动审核</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 安全设置 -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">安全与访问</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="sessionTimeout" class="form-label">会话超时时间（分钟）</label>
                        <input type="number" class="form-control" id="sessionTimeout" name="session_timeout" value="{{ settings.session_timeout|default:30 }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="maxLoginAttempts" class="form-label">最大登录尝试次数</label>
                        <input type="number" class="form-control" id="maxLoginAttempts" name="max_login_attempts" value="{{ settings.max_login_attempts|default:5 }}">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="text-end mb-5">
        <button type="submit" class="btn btn-primary px-5">
            <i class="fas fa-save me-2"></i>保存设置
        </button>
    </div>
</form>
{% endblock %}
