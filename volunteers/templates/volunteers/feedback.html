<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈建议 - 桑榆共暖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            color: #333;
        }
        
        .header {
            background: linear-gradient(to right, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        
        .feedback-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #444;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        
        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        .login-prompt {
            text-align: center;
            padding: 40px;
            background: #fff3cd;
            border-radius: 8px;
            color: #856404;
        }
        
        .login-prompt a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>反馈与建议</h1>
        <p>我们重视您的每一个声音</p>
    </div>
    
    <div class="container">
        {% if can_submit %}
            <div class="feedback-card">
                <h2 style="margin-bottom: 30px; color: #2c3e50;">提交您的反馈</h2>
                
                {% if messages %}
                    {% for message in messages %}
                        <div style="padding: 15px; margin-bottom: 20px; border-radius: 8px; 
                            {% if message.tags == 'success' %}background: #d4edda; color: #155724;
                            {% else %}background: #f8d7da; color: #721c24;{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label class="form-label">{{ form.content.label }}</label>
                        {{ form.content }}
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">{{ form.contact.label }}</label>
                        {{ form.contact }}
                    </div>
                    
                    <button type="submit" class="btn">提交反馈</button>
                </form>
            </div>
        {% else %}
            <div class="login-prompt">
                <h2>请先登录</h2>
                <p>提交反馈需要登录您的账号</p>
                <p style="margin-top: 20px;">
                    <a href="{% url 'login' %}?next={% url 'feedback' %}" class="btn">立即登录</a>
                </p>
            </div>
        {% endif %}
    </div>
</body>
</html>
