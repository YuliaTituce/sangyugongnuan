<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 桑榆共暖志愿服务平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .register-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        
        .register-header {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .register-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .register-header p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .register-form {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #4facfe;
        }
        
        .verification-group {
            display: flex;
            gap: 10px;
        }
        
        .verification-group input {
            flex: 1;
        }
        
        .btn-send-code {
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            cursor: pointer;
        }
        
        .btn-send-code:hover {
            background: #3a9bf5;
        }
        
        .btn-send-code:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-submit {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn-submit:hover {
            background: #3a9bf5;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .login-link a {
            color: #4facfe;
            text-decoration: none;
        }
        
        .message {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>加入桑榆共暖</h1>
            <p>让我们一起为社会贡献爱心</p>
        </div>
        
        <div class="register-form">
            {% if messages %}
                {% for message in messages %}
                    <div class="message {{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="POST" action="{% url 'register' %}" id="registerForm">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" 
                           id="email" 
                           name="email" 
                           class="form-control" 
                           placeholder="请输入您的邮箱地址"
                           required
                           value="{{ request.POST.email|default:'' }}">
                </div>
                
                <div class="form-group">
                    <label for="verification_code">验证码</label>
                    <div class="verification-group">
                        <input type="text" 
                               id="verification_code" 
                               name="verification_code" 
                               class="form-control" 
                               placeholder="请输入6位验证码"
                               maxlength="6"
                               required
                               value="{{ request.POST.verification_code|default:'' }}">
                        <button type="button" 
                                class="btn-send-code" 
                                id="btn-send-code"
                                onclick="sendVerificationCode()">
                            发送验证码
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-control" 
                           placeholder="请输入密码（至少8位）"
                           minlength="8"
                           required>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">确认密码</label>
                    <input type="password" 
                           id="confirm_password" 
                           name="confirm_password" 
                           class="form-control" 
                           placeholder="请再次输入密码"
                           minlength="8"
                           required>
                </div>
                
                <button type="submit" class="btn-submit">立即注册</button>
            </form>
            
            <div class="login-link">
                已有账号？<a href="{% url 'login' %}">立即登录</a>
            </div>
        </div>
    </div>
    
    <script>
        // 获取CSRF Token的辅助函数
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        // 发送验证码功能 - 修复版本
        function sendVerificationCode() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('btn-send-code');
            
            console.log('邮箱地址:', email); // 调试用
            
            if (!email) {
                alert('请输入邮箱地址');
                return;
            }
            
            // 验证邮箱格式
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('请输入有效的邮箱地址（例如：example@qq.com）');
                return;
            }
            
            // 禁用按钮，开始倒计时
            btn.disabled = true;
            let countdown = 60;
            
            const timer = setInterval(() => {
                btn.textContent = 重新发送(s);
                countdown--;
                
                if (countdown < 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            }, 1000);
            
            // 创建一个隐藏的表单来发送请求
            const formData = new FormData();
            formData.append('email', email);
            formData.append('purpose', 'register');
            formData.append('csrfmiddlewaretoken', getCookie('csrftoken'));
            
            // 使用FormData发送请求，这样后端可以从request.POST获取
            fetch('{% url "send_code" %}', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('服务器响应:', data); // 调试用
                if (data.success) {
                    alert('✅ 验证码已发送！请检查您的邮箱。');
                    console.log('开发模式提示：验证码功能已调用');
                } else {
                    alert('❌ 发送失败：' + data.message);
                    // 如果发送失败，恢复按钮
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            })
            .catch(error => {
                console.error('发送验证码失败:', error);
                alert('网络错误，请重试');
                // 恢复按钮
                clearInterval(timer);
                btn.disabled = false;
                btn.textContent = '发送验证码';
            });
        }
        
        // 表单提交验证
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (password !== confirmPassword) {
                event.preventDefault();
                alert('两次输入的密码不一致，请检查！');
                return false;
            }
            
            if (password.length < 8) {
                event.preventDefault();
                alert('密码长度至少8位！');
                return false;
            }
            
            return true;
        });
    </script>
</body>
</html>
